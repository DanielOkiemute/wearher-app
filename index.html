<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="
https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <main>
        <form action="">
            <input type="text" autocomplete="off"  id="valueSearch">
            <button><i class="fa-brands fa-searchengin"></i></button>
             
        </form>
        <section  class="result">
            <figure class="name" id="city">
                <figcaption>London</figcaption>
                <img src="https://flagsapi.com/GB/shiny/32.png" alt="">
                <figure class="temperature"   id="temperature">
                    <img src="https://openweathermap.org/img/wn/10d@4x.png" alt="">
                    <figcaption>
                        <span>31</span>
                        <sup>0</sup>
                    </figcaption>

                </figure>
                <p  class="description">
                    Overcast clouds
                </p>
                <ul>
                    <li>
                        <span>Clouds</span>
                        <i class="fa-solid fa-cloud"></i>
                        <span id="Clouds" >98</span>%
                    </li>
                    <li>
                        <span>Humidity</span>
                        <i class="fa-solid fa-droplet"></i>
                        <span id="Humidity">55</span>%
                    </li>
                    <li>
                        <span>Pressure</span>
                        <i class="fa-solid fa-gauge"></i>
                        <span id="Pressure">1001</span>hpa
                    </li>
                </ul>

            </figure>

        </section>
    </main>






    <script src="app.js"></script>
</body>
</html>
